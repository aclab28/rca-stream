<!DOCTYPE html>
<html>
<body style="background:#111; color:#eee; font-family:monospace; padding:16px;">
<h3>WebSocket Test</h3>
<div id="status">Connecting to echo server...</div>
<pre id="log" style="font-size:12px; white-space:pre-wrap;"></pre>
<script>
  const log = msg => {
    document.getElementById('log').textContent += msg + '\n'
  }

  const ws = new WebSocket('wss://echo.websocket.org')

  ws.onopen = () => {
    document.getElementById('status').textContent = '✅ Connected!'
    log('WebSocket works in Safari')
    ws.send('hello opensea')
  }

  ws.onmessage = e => log('Echo reply: ' + e.data)
  ws.onerror   = () => log('❌ Error')
  ws.onclose   = e => log('Closed: ' + e.code)
</script>
</body>
</html>
