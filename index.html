<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCA Listings — Reddit Collectible Avatars</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #121212;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 22px; font-weight: 700; color: white; margin-bottom: 2px; }
  header p  { font-size: 12px; color: #888; }

  #status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    color: #666;
    padding: 6px;
    background: #1a1a1a;
    border-bottom: 1px solid #222;
  }

  #status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .container { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* ── Signup ── */
  .signup-box {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  .signup-box h2 { font-size: 15px; font-weight: 600; color: white; margin-bottom: 4px; }
  .signup-box p  { font-size: 12px; color: #666; margin-bottom: 14px; }

  .signup-row { display: flex; gap: 8px; }

  .signup-row input {
    flex: 1;
    padding: 10px 14px;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 8px;
    font-size: 14px;
    color: white;
    outline: none;
  }

  .signup-row input::placeholder { color: #555; }
  .signup-row input:focus { border-color: #2081e2; }

  .signup-row button {
    background: #2081e2;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .signup-row button:hover { background: #1a6fc4; }

  #signup-msg { margin-top: 10px; font-size: 12px; min-height: 18px; color: #888; }
  .msg-success { color: #22c55e !important; }
  .msg-error   { color: #ef4444 !important; }

  /* ── Cards ── */
  .card {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
    display: flex;
    align-items: stretch;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: #444; }

  .card-img {
    width: 50%;
    aspect-ratio: 1;
    object-fit: cover;
    flex-shrink: 0;
    background: #2a2a2a;
    display: block;
  }

  .card-img-placeholder {
    width: 50%;
    aspect-ratio: 1;
    background: #2a2a2a;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .card-body {
    width: 50%;
    padding: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: white;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-price {
    font-size: 17px;
    font-weight: 700;
    color: #2081e2;
    margin-bottom: 8px;
  }

  .card-meta {
    font-size: 11px;
    color: #666;
    line-height: 1.8;
    margin-bottom: 10px;
  }

  .card-meta span {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-collection {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #2081e2;
    text-decoration: none;
    font-size: 11px;
    margin-bottom: 2px;
  }

  .card-collection:hover { text-decoration: underline; }

  .tag-new {
    display: inline-block;
    background: #022c22;
    color: #22c55e;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 6px;
  }

  /* ── Buttons ── */
  .card-buttons {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: auto;
  }

    .btn-opensea {
    display: block;
    text-align: center;
    background: #2081e2;
    color: white;
    border: 1px solid #2081e2;
    padding: 6px 10px;
    border-radius: 7px;
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
  }

  .btn-opensea:hover { background: #1a6fc4; }

  .btn-collection {
    display: block;
    text-align: center;
    background: transparent;
    color: #2081e2;
    border: 1px solid #2081e2;
    padding: 6px 10px;
    border-radius: 7px;
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
  }

  .btn-collection:hover { background: #1a2a3a; }

  /* ── States ── */
  .empty { text-align: center; padding: 60px 20px; color: #555; }
  .empty h2 { font-size: 18px; margin-bottom: 8px; color: #888; }

  #load-more { text-align: center; padding: 16px; color: #555; font-size: 13px; }

  #stats-bar {
    text-align: center;
    font-size: 11px;
    color: #555;
    padding: 6px;
    margin-bottom: 8px;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: #444;
    padding: 24px 16px;
    border-top: 1px solid #1e1e1e;
    margin-top: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>🎭 RCA Listings</h1>
  <p>Reddit Collectible Avatars — Live from OpenSea</p>
</header>

<div id="status">
  <div class="dot"></div>
  <span id="status-text">Loading...</span>
</div>

<div class="container">

  <div class="signup-box">
    <h2>Get listing alerts</h2>
    <p>Free email notifications when new Reddit Avatars are listed</p>
    <div class="signup-row">
      <input type="email" id="email-input" placeholder="you@email.com" />
      <button onclick="subscribe()">Subscribe</button>
    </div>
    <div id="signup-msg"></div>
  </div>

  <div id="stats-bar"></div>
  <div id="listings"></div>
  <div id="load-more"></div>

</div>

<footer>RCA Listings — Not affiliated with Reddit or OpenSea</footer>

<script>
  const ORACLE_URL = 'https://rca-listings.duckdns.org'
  const PAGE_SIZE  = 20
  let allListings  = []
  let visibleCount = PAGE_SIZE
  let loading      = false

  // ── Subscribe ─────────────────────────────────────────────
  async function subscribe() {
    const email = document.getElementById('email-input').value.trim()
    const msg   = document.getElementById('signup-msg')
    if (!email || !email.includes('@')) {
      msg.className = 'msg-error'
      msg.textContent = 'Please enter a valid email address.'
      return
    }
    msg.className = ''
    msg.textContent = 'Subscribing...'
    try {
      const resp = await fetch(`${ORACLE_URL}/subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      })
      const data = await resp.json()
      if (data.status === 'success') {
        msg.className = 'msg-success'
        msg.textContent = '✅ Subscribed! You will receive new listing alerts.'
        document.getElementById('email-input').value = ''
      } else if (data.status === 'already') {
        msg.className = 'msg-success'
        msg.textContent = '✅ You are already subscribed!'
      } else {
        msg.className = 'msg-error'
        msg.textContent = '❌ ' + data.message
      }
    } catch(e) {
      msg.className = 'msg-error'
      msg.textContent = 'Could not connect. Please try again.'
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') subscribe()
    })
  })

  // ── Helpers ───────────────────────────────────────────────
  function formatTime(isoString) {
    if (!isoString) return ''
    const date = new Date(isoString)
    const now  = new Date()
    const diff = Math.floor((now - date) / 1000)

    if (diff < 60)    return `${diff}s ago`
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`

    // Older than 24h — show date
    return date.toLocaleDateString('en-US', {
      month: 'short',
      day:   'numeric',
      hour:  'numeric',
      minute:'2-digit'
    })
  }

  function isNew(isoString) {
    if (!isoString) return false
    return (Date.now() - new Date(isoString)) < 3600000
  }

  function formatSlug(slug) {
    return slug
      .replace(/-x-reddit-collectible-avatars?(-\d+)?/gi, '')
      .replace(/-/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase())
      .trim()
  }

  function clean(s) {
    return s ? s.replace(/[^\x00-\x7F]/g, '').trim() : ''
  }

    function renderCard(listing) {
    const name       = clean(listing.name)
    const price      = clean(listing.price)
    const maker      = clean(listing.maker)
    const slug       = clean(listing.slug)
    const link       = clean(listing.link)
    const collName   = formatSlug(slug)
    const collUrl    = `https://opensea.io/collection/${slug}`
    const timeStr    = formatTime(listing.listed_at)
    const newTag     = isNew(listing.listed_at) ? `<div class="tag-new">New</div>` : ''

    const img = listing.image_url
      ? `<img class="card-img" src="${listing.image_url}" alt="${name}" onerror="this.outerHTML='<div class=card-img-placeholder>🎭</div>'">`
      : `<div class="card-img-placeholder">🎭</div>`

    return `
      <div class="card">
        ${img}
        <div class="card-body">
          <div>
            ${newTag}
            <div class="card-name">${name}</div>
            <div class="card-price">${price}</div>
            <div class="card-meta">
              <span>${collName}</span>
              <span>Seller: <a href="https://opensea.io/${maker}" target="_blank" style="color:#2081e2; text-decoration:none;">${maker}</a></span>
              <span>${timeStr}</span>
            </div>
          </div>
          <div class="card-buttons">
            <a class="btn-collection" href="${collUrl}" target="_blank">Collection</a>
            <a class="btn-opensea" href="${link}" target="_blank">View on OpenSea</a>
          </div>
        </div>
      </div>`
  }

  function renderVisible() {
    const el     = document.getElementById('listings')
    const loadEl = document.getElementById('load-more')
    el.innerHTML = allListings.slice(0, visibleCount).map(renderCard).join('')
    if (visibleCount < allListings.length) {
      loadEl.textContent = `Showing ${visibleCount} of ${allListings.length} — scroll for more`
    } else {
      loadEl.textContent = `All ${allListings.length} listings shown`
    }
  }

  window.addEventListener('scroll', () => {
    if (loading) return
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
      if (visibleCount < allListings.length) {
        loading = true
        visibleCount += PAGE_SIZE
        renderVisible()
        loading = false
      }
    }
  })

  async function loadListings() {
    try {
      const resp     = await fetch(`${ORACLE_URL}/listings?cb=${Date.now()}`)
      const listings = await resp.json()
      if (!listings || listings.length === 0) {
        document.getElementById('listings').innerHTML =
          `<div class="empty"><h2>No listings yet</h2><p>Watching for new Reddit Avatar listings...</p></div>`
        document.getElementById('status-text').textContent = 'Live — no listings yet'
        return
      }
      allListings = listings.slice().reverse()
      document.getElementById('status-text').textContent =
        `Live — ${allListings.length} listing${allListings.length !== 1 ? 's' : ''} — updates every 30s`
      document.getElementById('stats-bar').textContent =
        `${allListings.length} listing${allListings.length !== 1 ? 's' : ''} tracked today`
      renderVisible()
    } catch(e) {
      document.getElementById('listings').innerHTML =
        `<div class="empty"><h2>Could not load listings</h2><p>Check back soon</p></div>`
      document.getElementById('status-text').textContent = 'Connection error'
    }
  }

  loadListings()
  setInterval(loadListings, 30000)
</script>

</body>
</html>
